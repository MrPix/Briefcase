name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      
      - name: Install .NET MAUI Android Workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore SavedMessages.slnx

      - name: Build
        run: dotnet build SavedMessages.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/SavedMessages.UnitTests/SavedMessages.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: "**/test-results.trx"
          reporter: dotnet-trx
