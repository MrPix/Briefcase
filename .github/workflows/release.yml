name: Release

on:
  push:
    branches: ['release/*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      build_number: ${{ steps.version.outputs.BUILD_NUMBER }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from branch
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/heads/release/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install .NET MAUI Android Workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore Briefcase.slnx

      - name: Build
        run: |
          dotnet build Briefcase.slnx \
            --no-restore \
            --configuration Release \
            /p:Version=${{ steps.version.outputs.VERSION }} \
            /p:BuildNumber=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Run unit tests
        run: |
          dotnet test tests/Briefcase.UnitTests/Briefcase.UnitTests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx"

      - name: Run integration tests
        run: |
          dotnet test tests/Briefcase.IntegrationTests/Briefcase.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*test-results.trx"

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: "**/*test-results.trx"
          reporter: dotnet-trx

  docker-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: briefcase-api
            dockerfile: src/Briefcase.ApiService/Dockerfile
          - service: briefcase-web
            dockerfile: src/Briefcase.Web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.build-and-test.outputs.version }}
            type=raw,value=${{ needs.build-and-test.outputs.version }}-${{ needs.build-and-test.outputs.build_number }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.version }}
            BUILD_NUMBER=${{ needs.build-and-test.outputs.build_number }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
