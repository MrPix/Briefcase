<?xml version="1.0" encoding="UTF-8"?>
<!--
    Briefcase — Application Icon
    ──────────────────────────────────
    Concept : A clean briefcase silhouette to match the product name.
    Background: Slate gradient  #1E293B -> #0F172A
    Body      : White  #FFFFFF
    Clasp     : Cyan   #22D3EE

    Usage:
        - Standalone web icon / OG image (512 x 512)
        - MAUI native icon background/foreground references
-->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1E293B"/>
                        <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>
    </defs>

    <!-- Background rounded square -->
    <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

        <!-- Briefcase body -->
        <rect x="96" y="180" width="320" height="224" rx="40" fill="#FFFFFF"/>

        <!-- Handle -->
        <path d="M 184 180 V 150 C 184 123 207 100 234 100 H 278 C 305 100 328 123 328 150 V 180"
                    fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>

        <!-- Flap seam -->
        <line x1="96" y1="256" x2="416" y2="256" stroke="#0F172A" stroke-opacity="0.15" stroke-width="10"/>

        <!-- Clasp -->
        <rect x="232" y="244" width="48" height="64" rx="14" fill="#22D3EE"/>
</svg>
